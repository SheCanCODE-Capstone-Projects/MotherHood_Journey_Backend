name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    # Give permission to push to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:

      # Step 1 — Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3 — Build the jar file
      # Skip tests — they already passed in the CI pipeline
      - name: Build jar with Maven
        run: mvn package -DskipTests --no-transfer-progress

      # Step 4 — Log in to GitHub Container Registry
      # GITHUB_TOKEN is provided automatically by GitHub — no setup needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5 — Build the Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/shecancode-capstone-projects/motherhood_journey_backend:latest \
            -t ghcr.io/shecancode-capstone-projects/motherhood_journey_backend:${{ github.sha }} \
            .

      # Step 6 — Push Docker image to GitHub Container Registry
      - name: Push Docker image
        run: |
          docker push ghcr.io/shecancode-capstone-projects/motherhood_journey_backend:latest
          docker push ghcr.io/shecancode-capstone-projects/motherhood_journey_backend:${{ github.sha }}

      # Step 7 — Show where the image was pushed
      - name: Print image location
        run: |
          echo "Docker image pushed to:"
          echo "ghcr.io/shecancode-capstone-projects/motherhood_journey_backend:latest"