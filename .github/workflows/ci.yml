name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Test and Check Code Quality
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Download your code onto GitHub's temporary computer
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3 — Compile code, run unit tests, generate MapStruct code
      - name: Run Maven verify
        run: mvn verify --no-transfer-progress

      # Step 4 — Check code style rules from checkstyle.xml
      - name: Run Checkstyle
        run: mvn checkstyle:check --no-transfer-progress

      # Step 5 — Show test results in GitHub UI
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false

      # Step 6 — Upload Jacoco coverage report as artifact
      # So you can download and view it from GitHub Actions
      - name: Upload Jacoco coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 7