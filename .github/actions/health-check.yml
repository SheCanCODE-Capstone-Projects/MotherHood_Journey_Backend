name: Health Check
description: >
  Polls the Spring Boot Actuator health endpoint on a remote host
  until it returns HTTP 200 or the retry limit is reached. Fully
  configurable: callers set the scheme (http/https), port,
  retry count, and wait interval. Used identically in staging
  (http, port 8080, 12 retries) and production (https, port 443,
  6 retries) — no duplication.

inputs:
  host:
    description: Hostname or IP to check
    required: true
  port:
    description: Port number, e.g. "8080" or "443"
    required: false
    default: "8080"
  scheme:
    description: Protocol to use — "http" or "https"
    required: false
    default: http
  path:
    description: Health endpoint path
    required: false
    default: /actuator/health
  max-retries:
    description: Maximum number of polling attempts before failing
    required: false
    default: "12"
  interval:
    description: Seconds to wait between each attempt
    required: false
    default: "10"

runs:
  using: composite
  steps:
    - name: Poll health endpoint
      shell: bash
      env:
        SCHEME:      ${{ inputs.scheme }}
        HOST:        ${{ inputs.host }}
        PORT:        ${{ inputs.port }}
        PATH:        ${{ inputs.path }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        INTERVAL:    ${{ inputs.interval }}
      run: |
        URL="${SCHEME}://${HOST}:${PORT}${PATH}"
        echo "Polling $URL (max ${MAX_RETRIES} attempts, ${INTERVAL}s apart)"

        for i in $(seq 1 "$MAX_RETRIES"); do
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$URL" || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed on attempt $i — HTTP $HTTP_STATUS"
            exit 0
          fi

          echo "Attempt $i/${MAX_RETRIES} — HTTP $HTTP_STATUS. Retrying in ${INTERVAL}s..."
          sleep "$INTERVAL"
        done

        echo "Health check FAILED after ${MAX_RETRIES} attempts. Last status: $HTTP_STATUS"
        exit 1