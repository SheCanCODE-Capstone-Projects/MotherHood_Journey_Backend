name: Motherhood Journey CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/motherhood-journey
  JAVA_VERSION: "21"

# ─────────────────────────────────────────────────────────────────
#  STAGE 1 – TEST
#  Run unit + integration tests. Nothing proceeds if this fails.
# ─────────────────────────────────────────────────────────────────
jobs:
  test:
    name: "🧪 Stage 1 – Test"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: motherhood_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/motherhood_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_pass
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test-secret-key-for-ci-only-not-production
        run: mvn test --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  #  STAGE 2 – BUILD & PUSH
  #  Build Docker image, tag it, push to Docker Hub.
  #  Only runs after tests pass. Only on main/develop (not PRs).
  # ─────────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Stage 2 – Build & Push Image"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # Skip on PRs — don't push unreviewed code

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # GitHub Actions cache – makes builds faster
          cache-to: type=gha,mode=max
          platforms: linux/amd64        # Target prod platform explicitly

      - name: Image summary
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  #  STAGE 3 – STAGING
  #  Deploy to staging environment and run health + smoke checks.
  #  Acts as the quality gate before production.
  # ─────────────────────────────────────────────────────────────────
  stage:
    name: "🚦 Stage 3 – Staging & Verification"
    runs-on: ubuntu-latest
    needs: build
    environment: staging             # Requires environment protection rules in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        env:
          STAGING_HOST:   ${{ secrets.STAGING_HOST }}
          STAGING_USER:   ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          IMAGE_TAG:       ${{ needs.build.outputs.image_tag }}
        run: |
          echo "$STAGING_SSH_KEY" > /tmp/staging_key
          chmod 600 /tmp/staging_key

          ssh -o StrictHostKeyChecking=no -i /tmp/staging_key \
            $STAGING_USER@$STAGING_HOST << EOF
              set -e
              export DOCKER_HUB_USERNAME="${{ secrets.DOCKER_HUB_USERNAME }}"
              export DOCKER_IMAGE_NAME="motherhood-journey"
              export DOCKER_IMAGE_TAG="${IMAGE_TAG}"

              # Pull the exact image that was just built
              docker pull ${DOCKER_HUB_USERNAME}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}

              # Bring up staging stack
              cd /opt/motherhood-journey
              docker compose --env-file .env.staging up -d --no-build

              echo "Staging stack deployed."
          EOF

      - name: Wait for application to be healthy
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          echo "Waiting for /actuator/health to return 200..."
          MAX_RETRIES=12
          INTERVAL=10
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://$STAGING_HOST:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES – status: $STATUS. Retrying in ${INTERVAL}s..."
            sleep $INTERVAL
          done
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Smoke tests against staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          BASE="http://$STAGING_HOST:8080"

          check() {
            local endpoint="$1"
            local expected="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$endpoint")
            if [ "$status" != "$expected" ]; then
              echo "❌ SMOKE FAIL: $endpoint returned $status (expected $expected)"
              exit 1
            fi
            echo "✅ $endpoint → $status"
          }

          # Core health endpoints
          check "/actuator/health"  "200"
          check "/actuator/info"    "200"

          # Public API reachability (auth endpoints should return 4xx, not 5xx)
          check "/api/v1/auth/login"   "400"   # Bad request (no body) is expected

          echo "All smoke tests passed ✅"

      - name: Mark staging as verified
        run: |
          echo "STAGING_VERIFIED=true" >> $GITHUB_ENV
          echo "### ✅ Staging Verified" >> $GITHUB_STEP_SUMMARY
          echo "All health checks and smoke tests passed." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────
  #  STAGE 4 – DEPLOY TO PRODUCTION
  #  Only runs if staging was verified. Requires manual approval.
  #  Never deploys an image that hasn't passed staging.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Stage 4 – Production Deploy"
    runs-on: ubuntu-latest
    needs: stage                        # Hard dependency – no staging = no deploy
    if: |
      github.ref == 'refs/heads/main' &&
      needs.stage.result == 'success'   # Explicitly block if staging failed
    environment:
      name: production                  # Requires a human reviewer approval in GitHub
      url: https://yourdomain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          PROD_HOST:     ${{ secrets.PROD_HOST }}
          PROD_USER:     ${{ secrets.PROD_USER }}
          PROD_SSH_KEY:  ${{ secrets.PROD_SSH_KEY }}
          IMAGE_TAG:     ${{ needs.build.outputs.image_tag }}
        run: |
          echo "$PROD_SSH_KEY" > /tmp/prod_key
          chmod 600 /tmp/prod_key

          ssh -o StrictHostKeyChecking=no -i /tmp/prod_key \
            $PROD_USER@$PROD_HOST << EOF
              set -e
              export DOCKER_HUB_USERNAME="${{ secrets.DOCKER_HUB_USERNAME }}"
              export DOCKER_IMAGE_NAME="motherhood-journey"
              export DOCKER_IMAGE_TAG="${IMAGE_TAG}"

              # Pull exact image (same one that passed staging – not latest)
              docker pull ${DOCKER_HUB_USERNAME}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}

              cd /opt/motherhood-journey

              # Zero-downtime rolling update
              docker compose --env-file .env up -d --no-build

              echo "Production deploy complete."
          EOF

      - name: Verify production health
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
        run: |
          echo "Verifying production health..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://$PROD_HOST/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production is healthy"
              exit 0
            fi
            echo "Attempt $i – status: $STATUS. Retrying..."
            sleep 15
          done
          echo "❌ Production health check failed – consider rolling back"
          exit 1

      - name: Deployment summary
        run: |
          echo "### 🎉 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.build.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production ✅" >> $GITHUB_STEP_SUMMARY