version: "3.9"

#  Motherhood Journey – Docker Compose
#  Uses .env file for all secrets. Run: docker compose up -d

services:

  # PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: motherhood_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - motherhood_net

  # Spring Boot Application ─────────────────────────────────────
  app:
    image: ${DOCKER_HUB_USERNAME}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest}
    container_name: motherhood_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy       # Only start after DB is ready
    environment:
      SPRING_PROFILES_ACTIVE:           ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL:            jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME:       ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD:       ${DB_PASSWORD}
      SPRING_FLYWAY_ENABLED:            "true"
      JWT_SECRET:                       ${JWT_SECRET}
      JWT_EXPIRATION_MS:                ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS:             ${CORS_ALLOWED_ORIGINS}
      SERVER_PORT:                      ${APP_PORT:-8080}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - motherhood_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  motherhood_net:
    driver: bridge